name: Release
run-name: ${{ github.event_name == 'workflow_dispatch' && format('Manual release {0}', inputs.ref) || github.event.head_commit.message || format('Release {0}', github.ref_name) }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref_name }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git tag to release. Must start with v, for example v2.1.0-alpha.30'
        required: true
        type: string
      skip_publish_npm:
        description: 'Skip publishing to npmjs.org'
        required: false
        default: false
        type: boolean
      skip_publish_pkg:
        description: 'Skip publishing to pkg.nocobase.com'
        required: false
        default: false
        type: boolean
      skip_publish_pkg_src:
        description: 'Skip publishing to pkg-src.nocobase.com'
        required: false
        default: false
        type: boolean
      skip_publish_docker:
        description: 'Skip publishing Docker images'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      target_ref: ${{ steps.prepare.outputs.targetRef }}
      release_version: ${{ steps.prepare.outputs.releaseVersion }}
      major_minor_version: ${{ steps.prepare.outputs.majorMinorVersion }}
      default_tag: ${{ steps.prepare.outputs.defaultTag }}
      is_v1: ${{ steps.prepare.outputs.isV1 }}
      run_npm_release: ${{ steps.prepare.outputs.runNpmRelease }}
      run_pro_package_release: ${{ steps.prepare.outputs.runProPackageRelease }}
      run_docker_release: ${{ steps.prepare.outputs.runDockerRelease }}
      skip_publish_npm: ${{ steps.prepare.outputs.skipPublishNpm }}
      skip_publish_pkg: ${{ steps.prepare.outputs.skipPublishPkg }}
      skip_publish_pkg_src: ${{ steps.prepare.outputs.skipPublishPkgSrc }}
      skip_publish_docker: ${{ steps.prepare.outputs.skipPublishDocker }}
    steps:
      - name: Prepare release context
        id: prepare
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_REF: ${{ inputs.ref }}
          INPUT_SKIP_PUBLISH_NPM: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_publish_npm && 'true' || 'false' }}
          INPUT_SKIP_PUBLISH_PKG: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_publish_pkg && 'true' || 'false' }}
          INPUT_SKIP_PUBLISH_PKG_SRC: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_publish_pkg_src && 'true' || 'false' }}
          INPUT_SKIP_PUBLISH_DOCKER: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_publish_docker && 'true' || 'false' }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            TARGET_REF="$INPUT_REF"
            SKIP_PUBLISH_NPM="$INPUT_SKIP_PUBLISH_NPM"
            SKIP_PUBLISH_PKG="$INPUT_SKIP_PUBLISH_PKG"
            SKIP_PUBLISH_PKG_SRC="$INPUT_SKIP_PUBLISH_PKG_SRC"
            SKIP_PUBLISH_DOCKER="$INPUT_SKIP_PUBLISH_DOCKER"
          else
            TARGET_REF="$GITHUB_REF_NAME"
            SKIP_PUBLISH_NPM=false
            SKIP_PUBLISH_PKG=false
            SKIP_PUBLISH_PKG_SRC=false
            SKIP_PUBLISH_DOCKER=false
          fi

          if [[ -z "$TARGET_REF" ]]; then
            echo "Release ref is required." >&2
            exit 1
          fi

          if [[ ! "$TARGET_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.].*)?$ ]]; then
            echo "Release ref must be a git tag like v2.1.0 or v2.1.0-alpha.30." >&2
            exit 1
          fi

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            if ! gh api -H "Accept: application/vnd.github+json" "/repos/$GITHUB_REPOSITORY/git/ref/tags/$TARGET_REF" >/dev/null 2>&1; then
              echo "Tag $TARGET_REF not found in $GITHUB_REPOSITORY." >&2
              exit 1
            fi

            if [[ "$SKIP_PUBLISH_NPM" == "true" && "$SKIP_PUBLISH_PKG" == "true" && "$SKIP_PUBLISH_PKG_SRC" == "true" && "$SKIP_PUBLISH_DOCKER" == "true" ]]; then
              echo "At least one release target must be enabled." >&2
              exit 1
            fi
          fi

          if [[ "$TARGET_REF" =~ ^v1\. ]]; then
            DEFAULT_TAG=v1
            IS_V1=true
          elif [[ "$TARGET_REF" =~ beta ]]; then
            DEFAULT_TAG=beta
            IS_V1=false
          elif [[ "$TARGET_REF" =~ alpha ]]; then
            DEFAULT_TAG=alpha
            IS_V1=false
          else
            DEFAULT_TAG=latest
            IS_V1=false
          fi

          RELEASE_VERSION="${TARGET_REF#v}"
          if [[ "$RELEASE_VERSION" =~ ^([0-9]+)\.([0-9]+)\. ]]; then
            MAJOR_MINOR_VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
          else
            echo "Failed to parse major.minor version from $TARGET_REF." >&2
            exit 1
          fi

          RUN_NPM_RELEASE=true
          if [[ "$SKIP_PUBLISH_NPM" == "true" ]]; then
            RUN_NPM_RELEASE=false
          fi

          RUN_PRO_PACKAGE_RELEASE=true
          if [[ "$SKIP_PUBLISH_PKG" == "true" && "$SKIP_PUBLISH_PKG_SRC" == "true" ]]; then
            RUN_PRO_PACKAGE_RELEASE=false
          fi

          RUN_DOCKER_RELEASE=true
          if [[ "$SKIP_PUBLISH_DOCKER" == "true" ]]; then
            RUN_DOCKER_RELEASE=false
          fi

          echo "targetRef=$TARGET_REF" >> "$GITHUB_OUTPUT"
          echo "releaseVersion=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "majorMinorVersion=$MAJOR_MINOR_VERSION" >> "$GITHUB_OUTPUT"
          echo "defaultTag=$DEFAULT_TAG" >> "$GITHUB_OUTPUT"
          echo "isV1=$IS_V1" >> "$GITHUB_OUTPUT"
          echo "runNpmRelease=$RUN_NPM_RELEASE" >> "$GITHUB_OUTPUT"
          echo "runProPackageRelease=$RUN_PRO_PACKAGE_RELEASE" >> "$GITHUB_OUTPUT"
          echo "runDockerRelease=$RUN_DOCKER_RELEASE" >> "$GITHUB_OUTPUT"
          echo "skipPublishNpm=$SKIP_PUBLISH_NPM" >> "$GITHUB_OUTPUT"
          echo "skipPublishPkg=$SKIP_PUBLISH_PKG" >> "$GITHUB_OUTPUT"
          echo "skipPublishPkgSrc=$SKIP_PUBLISH_PKG_SRC" >> "$GITHUB_OUTPUT"
          echo "skipPublishDocker=$SKIP_PUBLISH_DOCKER" >> "$GITHUB_OUTPUT"

  get-plugins:
    if: ${{ needs.prepare-release.outputs.run_pro_package_release == 'true' }}
    needs:
      - prepare-release
    uses: nocobase/nocobase/.github/workflows/get-plugins.yml@main
    with:
      require_tag: ${{ github.event_name == 'workflow_dispatch' && needs.prepare-release.outputs.target_ref || '' }}
      # For v1.x maintenance releases, only include repos that have the v1 branch.
      # For v2+ we keep the original behavior (no filtering at this stage).
      require_branch: ${{ needs.prepare-release.outputs.is_v1 == 'true' && 'v1' || '' }}
    secrets: inherit

  publish-packages:
    if: ${{ always() && needs.prepare-release.result == 'success' && (needs.prepare-release.outputs.run_npm_release == 'true' || needs.prepare-release.outputs.run_pro_package_release == 'true') && (needs.get-plugins.result == 'success' || needs.get-plugins.result == 'skipped') }}
    needs:
      - prepare-release
      - get-plugins
    runs-on: ubuntu-latest
    env:
      TARGET_REF: ${{ needs.prepare-release.outputs.target_ref }}
    steps:
      - name: Set Node.js 22
        uses: actions/setup-node@v3
        with:
          node-version: 22
      - name: Get info
        id: get-info
        shell: bash
        run: |
          echo "defaultTag=${{ needs.prepare-release.outputs.default_tag }}" >> "$GITHUB_OUTPUT"

          if [[ "${{ needs.prepare-release.outputs.run_pro_package_release }}" != 'true' ]]; then
            echo "proRepos=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$TARGET_REF" =~ ^v1\. ]]; then
            echo "proRepos=$(echo '${{ needs.get-plugins.outputs.all-plugins }}')" >> "$GITHUB_OUTPUT"
          elif [[ "$TARGET_REF" =~ beta ]]; then
            echo "proRepos=$(echo '${{ needs.get-plugins.outputs.beta-plugins }}')" >> "$GITHUB_OUTPUT"
          elif [[ "$TARGET_REF" =~ alpha ]]; then
            echo "proRepos=$(echo '${{ needs.get-plugins.outputs.alpha-plugins }}')" >> "$GITHUB_OUTPUT"
          else
            # rc
            echo "proRepos=$(echo '${{ needs.get-plugins.outputs.rc-plugins }}')" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/create-github-app-token@v1
        id: validate-token
        if: ${{ needs.prepare-release.outputs.is_v1 == 'true' && needs.prepare-release.outputs.run_pro_package_release == 'true' }}
        with:
          app-id: ${{ vars.NOCOBASE_APP_ID }}
          private-key: ${{ secrets.NOCOBASE_APP_PRIVATE_KEY }}
          # Use owner-wide installation token so validation can read tags from other (possibly private) repos.
          owner: nocobase
          skip-token-revoke: true

      - name: Prepare dist-tag arg
        shell: bash
        run: |
          DIST_TAG="${{ steps.get-info.outputs.defaultTag }}"
          if [[ -n "$DIST_TAG" ]]; then
            echo "DIST_TAG_ARG=--dist-tag=$DIST_TAG" >> "$GITHUB_ENV"
            echo "NPM_TAG_ARG=--tag=$DIST_TAG" >> "$GITHUB_ENV"
          else
            echo "DIST_TAG_ARG=" >> "$GITHUB_ENV"
            echo "NPM_TAG_ARG=" >> "$GITHUB_ENV"
          fi

      - name: Validate v1 tag exists in all selected repos
        if: ${{ needs.prepare-release.outputs.is_v1 == 'true' && needs.prepare-release.outputs.run_pro_package_release == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="$TARGET_REF"
          missing=()

          for repo in $(echo '${{ steps.get-info.outputs.proRepos }}' | jq -r '.[]'); do
            if ! gh api -H "Accept: application/vnd.github+json" "/repos/nocobase/$repo/git/ref/tags/$TAG" >/dev/null 2>&1; then
              missing+=("$repo")
            fi
          done

          for repo in $(echo '${{ needs.get-plugins.outputs.custom-plugins }}' | jq -r '.[]'); do
            if ! gh api -H "Accept: application/vnd.github+json" "/repos/nocobase/$repo/git/ref/tags/$TAG" >/dev/null 2>&1; then
              missing+=("$repo")
            fi
          done

          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "Missing tag $TAG in repos:" >&2
            printf '%s\n' "${missing[@]}" >&2
            exit 1
          fi
        env:
          GH_TOKEN: ${{ steps.validate-token.outputs.token }}

      - uses: actions/create-github-app-token@v1
        id: app-token
        if: ${{ needs.prepare-release.outputs.run_pro_package_release == 'true' }}
        with:
          app-id: ${{ vars.NOCOBASE_APP_ID }}
          private-key: ${{ secrets.NOCOBASE_APP_PRIVATE_KEY }}
          repositories: nocobase,pro-plugins,${{ join(fromJSON(steps.get-info.outputs.proRepos), ',') }},${{ join(fromJSON(needs.get-plugins.outputs.custom-plugins), ',') }}
          skip-token-revoke: true
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ needs.prepare-release.outputs.target_ref }}
      - name: Send curl request and parse response
        if: ${{ needs.prepare-release.outputs.run_pro_package_release == 'true' }}
        env:
          PKG_USERNAME: ${{ secrets.PKG_USERNAME }}
          PKG_PASSWORD: ${{ secrets.PKG_PASSWORD }}
        run: |
          mkdir git-ci-cache
          apt-get update && apt-get install -y jq
          response1=$(curl -s 'https://pkg.nocobase.com/-/verdaccio/sec/login' \
            -H 'content-type: application/json' \
            --data-raw '{"username":"'$PKG_USERNAME'","password":"'$PKG_PASSWORD'"}')
          token1=$(echo "$response1" | jq -r '.token')
          response2=$(curl -s 'https://pkg-src.nocobase.com/-/verdaccio/sec/login' \
            -H 'content-type: application/json' \
            --data-raw '{"username":"'$PKG_USERNAME'","password":"'$PKG_PASSWORD'"}')
          token2=$(echo "$response2" | jq -r '.token')
          echo "PKG_NOCOBASE_TOKEN=$token1" >> "$GITHUB_ENV"
          echo "PKG_SRC_NOCOBASE_TOKEN=$token2" >> "$GITHUB_ENV"
      - name: yarn install and build
        run: |
          yarn config set registry https://registry.npmjs.org/
          yarn install
          yarn build
      - name: publish npmjs.org
        if: ${{ needs.prepare-release.outputs.run_npm_release == 'true' }}
        continue-on-error: true
        run: |
          git config --global user.email "test@mail.com"
          git config --global user.name "test"
          git config --global --add safe.directory /__w/nocobase/nocobase
          echo "# test" >> Release.md
          git add .
          git commit -m "chore(versions): test publish packages xxx"
          npm config set access public
          npm config set registry https://registry.npmjs.org/
          npm config set //registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}
          yarn config set access public
          yarn config set registry https://registry.npmjs.org/
          yarn config set //registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}
          npm whoami
          yarn release:force --no-verify-access --no-git-reset --registry https://registry.npmjs.org/ $DIST_TAG_ARG
      - name: Checkout pro-plugins
        if: ${{ needs.prepare-release.outputs.run_pro_package_release == 'true' }}
        uses: actions/checkout@v3
        with:
          repository: nocobase/pro-plugins
          path: packages/pro-plugins
          ref: ${{ needs.prepare-release.outputs.target_ref }}
          token: ${{ steps.app-token.outputs.token }}
      - name: Clone pro repos
        if: ${{ needs.prepare-release.outputs.run_pro_package_release == 'true' }}
        shell: bash
        run: |
          for repo in ${{ join(fromJSON(steps.get-info.outputs.proRepos), ' ') }} ${{ join(fromJSON(needs.get-plugins.outputs.custom-plugins), ' ') }}
          do
            git clone -b $TARGET_REF https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/nocobase/$repo.git packages/pro-plugins/@nocobase/$repo
          done
      - name: Build Pro plugins
        if: ${{ needs.prepare-release.outputs.run_pro_package_release == 'true' }}
        run: |
          yarn config set registry https://registry.npmjs.org/
          yarn install
          yarn build packages/pro-plugins
      - name: Resolve pro plugin scopes
        if: ${{ needs.prepare-release.outputs.run_pro_package_release == 'true' }}
        id: pro-plugin-scopes
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_JSONS=$(
            find packages/pro-plugins -name package.json \
              -not -path '*/node_modules/*' \
              -not -path 'packages/pro-plugins/package.json' \
              -exec jq -r 'select(.private != true) | input_filename' {} + \
              | sort
          )

          if [[ -n "$PACKAGE_JSONS" ]]; then
            echo "Packages to publish:"
            while IFS= read -r package_json; do
              [[ -n "$package_json" ]] || continue
              jq -r '.name' "$package_json"
            done <<< "$PACKAGE_JSONS"
            echo "count=1" >> "$GITHUB_OUTPUT"
            {
              echo 'package_jsons<<EOF'
              printf '%s\n' "$PACKAGE_JSONS"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            echo "No pro plugin packages to publish."
            echo "count=0" >> "$GITHUB_OUTPUT"
            {
              echo 'package_jsons<<EOF'
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi
      - name: publish pkg.nocobase.com
        if: ${{ needs.prepare-release.outputs.skip_publish_pkg != 'true' && needs.prepare-release.outputs.run_pro_package_release == 'true' && steps.pro-plugin-scopes.outputs.count != '0' }}
        shell: bash
        run: |
          set -euo pipefail
          git reset --hard
          npm config set //pkg.nocobase.com/:_authToken=${{ env.PKG_NOCOBASE_TOKEN }}

          publish_or_skip() {
            local package_dir="$1"
            local registry="$2"
            local package_name="$3"
            local log_file
            log_file=$(mktemp)

            if npm publish "$package_dir" --registry "$registry" $NPM_TAG_ARG >"$log_file" 2>&1; then
              cat "$log_file"
              rm -f "$log_file"
              return 0
            fi

            cat "$log_file"
            if grep -q "E409" "$log_file" || grep -q "already present" "$log_file"; then
              echo "Skip publishing $package_name to $registry because this version already exists."
              rm -f "$log_file"
              return 0
            fi

            rm -f "$log_file"
            return 1
          }

          while IFS= read -r package_json; do
            [[ -n "$package_json" ]] || continue
            package_dir=$(dirname "$package_json")
            package_name=$(jq -r '.name' "$package_json")
            echo "Publishing $package_name to pkg.nocobase.com"
            publish_or_skip "$package_dir" "https://pkg.nocobase.com" "$package_name"
          done <<'EOF'
          ${{ steps.pro-plugin-scopes.outputs.package_jsons }}
          EOF
      - name: publish pkg-src.nocobase.com
        if: ${{ needs.prepare-release.outputs.skip_publish_pkg_src != 'true' && needs.prepare-release.outputs.run_pro_package_release == 'true' && steps.pro-plugin-scopes.outputs.count != '0' }}
        shell: bash
        run: |
          set -euo pipefail
          git reset --hard
          bash generate-npmignore.sh ignore-src
          npm config set //pkg-src.nocobase.com/:_authToken=${{ env.PKG_SRC_NOCOBASE_TOKEN }}

          publish_or_skip() {
            local package_dir="$1"
            local registry="$2"
            local package_name="$3"
            local log_file
            log_file=$(mktemp)

            if npm publish "$package_dir" --registry "$registry" $NPM_TAG_ARG >"$log_file" 2>&1; then
              cat "$log_file"
              rm -f "$log_file"
              return 0
            fi

            cat "$log_file"
            if grep -q "E409" "$log_file" || grep -q "already present" "$log_file"; then
              echo "Skip publishing $package_name to $registry because this version already exists."
              rm -f "$log_file"
              return 0
            fi

            rm -f "$log_file"
            return 1
          }

          while IFS= read -r package_json; do
            [[ -n "$package_json" ]] || continue
            package_dir=$(dirname "$package_json")
            package_name=$(jq -r '.name' "$package_json")
            echo "Publishing $package_name to pkg-src.nocobase.com"
            publish_or_skip "$package_dir" "https://pkg-src.nocobase.com" "$package_name"
          done <<'EOF'
          ${{ steps.pro-plugin-scopes.outputs.package_jsons }}
          EOF

  push-docker:
    if: ${{ always() && needs.prepare-release.result == 'success' && needs.prepare-release.outputs.run_docker_release == 'true' && (needs.publish-packages.result == 'success' || needs.publish-packages.result == 'skipped') }}
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - publish-packages
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ needs.prepare-release.outputs.target_ref }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Prepare all tags
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_VERSION="${{ needs.prepare-release.outputs.release_version }}"
          MAJOR_MINOR_VERSION="${{ needs.prepare-release.outputs.major_minor_version }}"
          DEFAULT_TAG="${{ needs.prepare-release.outputs.default_tag }}"
          ALI_REG="${{ secrets.ALI_DOCKER_PUBLIC_REGISTRY }}"

          TAGS=(
            "nocobase/nocobase:$RELEASE_VERSION"
            "$ALI_REG/nocobase/nocobase:$RELEASE_VERSION"
            "nocobase/nocobase:$MAJOR_MINOR_VERSION"
            "$ALI_REG/nocobase/nocobase:$MAJOR_MINOR_VERSION"
          )

          # For v1 maintenance tags, do not push a floating default tag (e.g. `latest`).
          if [[ "${{ needs.prepare-release.outputs.is_v1 }}" != 'true' ]]; then
            TAGS+=("nocobase/nocobase:$DEFAULT_TAG")
            TAGS+=("$ALI_REG/nocobase/nocobase:$DEFAULT_TAG")
          fi

          ALL_TAGS=$(IFS=, ; echo "${TAGS[*]}")
          echo "ALL_TAGS=$ALL_TAGS" >> "$GITHUB_ENV"
      - name: Prepare all full tags
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_VERSION="${{ needs.prepare-release.outputs.release_version }}"
          MAJOR_MINOR_VERSION="${{ needs.prepare-release.outputs.major_minor_version }}"
          DEFAULT_TAG="${{ needs.prepare-release.outputs.default_tag }}"
          ALI_REG="${{ secrets.ALI_DOCKER_PUBLIC_REGISTRY }}"

          TAGS=(
            "nocobase/nocobase:$RELEASE_VERSION-full"
            "$ALI_REG/nocobase/nocobase:$RELEASE_VERSION-full"
            "nocobase/nocobase:$MAJOR_MINOR_VERSION-full"
            "$ALI_REG/nocobase/nocobase:$MAJOR_MINOR_VERSION-full"
          )

          # For v1 maintenance tags, do not push a floating default tag (e.g. `latest-full`).
          if [[ "${{ needs.prepare-release.outputs.is_v1 }}" != 'true' ]]; then
            TAGS+=("nocobase/nocobase:$DEFAULT_TAG-full")
            TAGS+=("$ALI_REG/nocobase/nocobase:$DEFAULT_TAG-full")
          fi

          ALL_TAGS=$(IFS=, ; echo "${TAGS[*]}")
          echo "ALL_FULL_TAGS=$ALL_TAGS" >> "$GITHUB_ENV"
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to Aliyun Container Registry (Public)
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.ALI_DOCKER_PUBLIC_REGISTRY }}
          username: ${{ secrets.ALI_DOCKER_USERNAME }}
          password: ${{ secrets.ALI_DOCKER_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v3
        with:
          context: ./docker/nocobase
          build-args: |
            CNA_VERSION=${{ needs.prepare-release.outputs.release_version }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.ALL_TAGS }}
      - name: Build and push (Full)
        uses: docker/build-push-action@v3
        with:
          context: ./docker/nocobase
          file: ./docker/nocobase/Dockerfile-full
          build-args: |
            CNA_VERSION=${{ needs.prepare-release.outputs.release_version }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.ALL_FULL_TAGS }}

  feishu-notify:
    runs-on: ubuntu-latest
    if: ${{ always() && needs.prepare-release.result == 'success' }}
    needs:
      - prepare-release
      - publish-packages
      - push-docker
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ needs.prepare-release.outputs.target_ref }}
      - name: Determine overall result
        id: result
        shell: bash
        run: |
          PACKAGES_REQUIRED=false
          if [[ "${{ needs.prepare-release.outputs.run_npm_release }}" == "true" || "${{ needs.prepare-release.outputs.run_pro_package_release }}" == "true" ]]; then
            PACKAGES_REQUIRED=true
          fi

          PACKAGES_OK=true
          if [[ "$PACKAGES_REQUIRED" == "true" && "${{ needs.publish-packages.result }}" != "success" ]]; then
            PACKAGES_OK=false
          fi

          DOCKER_OK=true
          if [[ "${{ needs.prepare-release.outputs.run_docker_release }}" == "true" && "${{ needs.push-docker.result }}" != "success" ]]; then
            DOCKER_OK=false
          fi

          if [[ "$PACKAGES_OK" == "true" && "$DOCKER_OK" == "true" ]]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi
      - name: Set current date
        run: echo "CURRENT_DATE=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')" >> "$GITHUB_ENV"
      - name: Send Feishu notification
        shell: bash
        env:
          WEBHOOK_URL: ${{ secrets.RELEASE_RESULT_FEISHU_WEBHOOK_URL }}
          TITLE: "NocoBase 版本 ${{ needs.prepare-release.outputs.target_ref }} Release 结果通知"
          STATUS: ${{ steps.result.outputs.status }}
          CONTENT: "**版本：**${{ needs.prepare-release.outputs.target_ref }}\n**时间：**${{ env.CURRENT_DATE }}\n**状态：**${{ steps.result.outputs.status == 'success' && '✅ 构建成功' || '❌ 构建失败' }}"
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash scripts/feishu-notify.sh
