name: Deploy client docs

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - 'main'
    paths:
      - 'packages/core/client/**'
      - 'packages/core/client/docs/**'
      - '.github/workflows/deploy-client-docs.yml'
  pull_request:
    branches:
      - '**'
    paths:
      - 'packages/core/client/**'
      - 'packages/core/client/docs/**'
      - '.github/workflows/deploy-client-docs.yml'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install
      - name: Build zh-CN
        run: pnpm doc build core/client --lang=zh-CN
        env:
          NODE_OPTIONS: --max-old-space-size=4096
      - name: Build en-US
        run: pnpm doc build core/client --lang=en-US
        env:
          NODE_OPTIONS: --max-old-space-size=4096
      - name: Set tags
        id: set-tags
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "tags=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tags=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi
      - name: copy files via ssh - ${{ steps.set-tags.outputs.tags }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CN_CLIENT_HOST }}
          username: ${{ secrets.CN_CLIENT_USERNAME }}
          key: ${{ secrets.CN_CLIENT_KEY }}
          port: ${{ secrets.CN_CLIENT_PORT }}
          source: 'packages/core/client/dist/*'
          target: ${{ secrets.CN_CLIENT_TARGET }}/${{ steps.set-tags.outputs.tags }}
