name: Agent Gateway release gate

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Run the release gate with live evidence, or automated checks only
        required: true
        default: release
        type: choice
        options:
          - release
          - automated-only
      source_run_id:
        description: Workflow run containing raw agent-gateway-live-source outputs from Agent Browser, providers, and WS denial probes
        required: false
        type: string
      required_providers:
        description: Comma-separated provider binaries required by this release environment
        required: false
        default: ''
        type: string

permissions:
  actions: read
  contents: read

jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      EVIDENCE_DIR: /tmp/agent-gateway-acceptance
      SOURCE_DIR: /tmp/agent-gateway-live-source
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release-gate mode
        run: |
          if [ "${{ inputs.mode }}" = "release" ] && [ -z "${{ inputs.source_run_id }}" ]; then
            echo "release mode requires source_run_id" >&2
            exit 1
          fi
          if [ "${{ inputs.mode }}" = "automated-only" ] && [ -n "${{ inputs.source_run_id }}" ]; then
            echo "automated-only mode does not accept source_run_id" >&2
            exit 1
          fi

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download raw live evidence outputs
        if: inputs.mode == 'release'
        run: gh run download "${{ inputs.source_run_id }}" --name agent-gateway-live-source --dir "$SOURCE_DIR"

      - name: Prepare a fresh evidence execution
        if: inputs.mode == 'automated-only'
        working-directory: packages/plugins/@nocobase/plugin-agent-gateway
        run: >-
          yarn acceptance:prepare
          --evidence-dir "$EVIDENCE_DIR"
          --required-providers "${{ inputs.required_providers }}"

      - name: Restore the source execution context
        if: inputs.mode == 'release'
        run: |
          test -s "$SOURCE_DIR/context.json"
          mkdir -p "$EVIDENCE_DIR"
          cp "$SOURCE_DIR/context.json" "$EVIDENCE_DIR/context.json"

      - name: Collect anchored live evidence
        if: inputs.mode == 'release'
        working-directory: packages/plugins/@nocobase/plugin-agent-gateway
        run: >-
          yarn acceptance:collect
          --evidence-dir "$EVIDENCE_DIR"
          --source-dir "$SOURCE_DIR"

      - name: Run release gate
        id: release_gate
        continue-on-error: true
        working-directory: packages/plugins/@nocobase/plugin-agent-gateway
        run: |
          args=(acceptance:verify --evidence-dir "$EVIDENCE_DIR" --scope full)
          if [ "${{ inputs.mode }}" = "automated-only" ]; then
            args+=(--allow-incomplete)
          fi
          yarn "${args[@]}"

      - name: Upload release evidence and reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-gateway-live-evidence-${{ github.run_id }}
          path: /tmp/agent-gateway-acceptance
          if-no-files-found: error

      - name: Enforce release gate result
        if: steps.release_gate.outcome != 'success'
        run: exit 1
