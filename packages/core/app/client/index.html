<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NocoBase</title>
    <script>
      window.__nocobase_public_path__ = '<%= BASE_URL %>';
      window.__nocobase_api_base_url__ = '<%= API_BASE_URL %>';
      window.__nocobase_api_client_storage_prefix__ = '<%= API_CLIENT_STORAGE_PREFIX %>';
      window.__nocobase_api_client_storage_type__ = '<%= API_CLIENT_STORAGE_TYPE %>';
      window.__nocobase_api_client_share_token__ = '<%= API_CLIENT_SHARE_TOKEN %>' === 'true';
      window.__nocobase_ws_url__ = '<%= WS_URL %>';
      window.__nocobase_ws_path__ = '<%= WS_PATH %>';
      window.process = window.process || {};
      window.process.env = {
        ...(window.process.env || {}),
        NODE_ENV: '<%= NODE_ENV %>',
        APP_PUBLIC_PATH: '<%= BASE_URL %>',
        API_BASE_URL: '<%= API_BASE_URL %>',
        API_CLIENT_STORAGE_PREFIX: '<%= API_CLIENT_STORAGE_PREFIX %>',
        API_CLIENT_STORAGE_TYPE: '<%= API_CLIENT_STORAGE_TYPE %>',
        API_CLIENT_SHARE_TOKEN: '<%= API_CLIENT_SHARE_TOKEN %>',
        WEBSOCKET_URL: '<%= WS_URL %>',
        WS_PATH: '<%= WS_PATH %>',
      };
    </script>
    <script src="<%= BASE_URL %>browser-checker.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
