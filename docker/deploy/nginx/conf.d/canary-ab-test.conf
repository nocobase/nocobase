# ============================================================
# Nginx 灰度发布配置 - A/B 测试
# ============================================================
# 使用说明：
# 1. 此配置实现 A/B 测试场景
# 2. 基于用户 ID 哈希进行一致性分流
# 3. 确保同一用户始终访问同一版本

# 上游服务器定义
upstream nocobase_version_a {
    server app:80;
    keepalive 32;
}

upstream nocobase_version_b {
    server app-canary:80;
    keepalive 32;
}

# 基于用户 ID 哈希的路由判断
# 使用 $cookie_user_id 或 $arg_user_id 作为分流依据
map "$cookie_user_id$arg_user_id" $ab_group {
    default "A";
    # 哈希值以 0-4 开头的用户分配到 B 组（约 50%）
    ~^[0-4] "B";
    # 哈希值以 5-9 开头的用户分配到 A 组（约 50%）
    ~^[5-9] "A";
}

# 灰度发布服务器 - A/B 测试
server {
    listen 80;
    server_name _;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 上传文件目录
    location /storage/uploads/ {
        alias /var/www/nocobase/storage/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 主应用代理 - A/B 测试
    location / {
        set $upstream "nocobase_version_a";

        if ($ab_group = "B") {
            set $upstream "nocobase_version_b";
        }

        proxy_pass http://$upstream;
        proxy_http_version 1.1;

        # 代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # A/B 测试标识头
        add_header X-AB-Group $ab_group always;
        add_header X-AB-Test "user-id-hash" always;
        add_header X-Upstream-Server $upstream_addr always;
    }

    # API 代理
    location /api/ {
        set $upstream "nocobase_version_a";

        if ($ab_group = "B") {
            set $upstream "nocobase_version_b";
        }

        proxy_pass http://$upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        add_header X-AB-Group $ab_group always;
    }

    # 健康检查端点
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # A/B 测试状态查询
    location /ab-status {
        access_log off;
        return 200 '{"group":"$ab_group","strategy":"user-id-hash"}';
        add_header Content-Type application/json;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
