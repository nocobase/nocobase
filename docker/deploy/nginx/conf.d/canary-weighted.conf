# ============================================================
# Nginx 灰度发布配置 - 基于权重的流量分配
# ============================================================
# 使用说明：
# 1. 此配置实现基于权重的灰度发布
# 2. 通过调整 weight 值控制新旧版本流量比例
# 3. 适用于渐进式发布场景

# 上游服务器组 - 稳定版本（主版本）
upstream nocobase_stable {
    server app:80 weight=9;      # 稳定版本，90% 流量
    server app-canary:80 weight=1;  # 灰度版本，10% 流量
    keepalive 32;
}

# 灰度发布服务器
server {
    listen 80;
    server_name _;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Version "$upstream_addr" always;

    # 上传文件目录（静态文件直接服务）
    location /storage/uploads/ {
        alias /var/www/nocobase/storage/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 主应用代理 - 灰度发布
    location / {
        proxy_pass http://nocobase_stable;
        proxy_http_version 1.1;

        # 代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 添加版本头用于调试
        add_header X-Upstream-Server $upstream_addr always;
        add_header X-Response-Time $request_time always;
    }

    # API 代理（单独配置更长超时）
    location /api/ {
        proxy_pass http://nocobase_stable;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # API 请求允许更长超时
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        add_header X-Upstream-Server $upstream_addr always;
    }

    # 健康检查端点
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # 版本信息端点
    location /version {
        access_log off;
        return 200 '{"stable":"app:80","canary":"app-canary:80","strategy":"weighted"}';
        add_header Content-Type application/json;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
